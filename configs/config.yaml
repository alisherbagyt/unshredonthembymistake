# shred_net v2 — every tunable lives here, nothing hardcoded in source.
# upgrade any stage by flipping a single key.

pipeline:
  input_dir:    "data/raw"
  output_image: "data/reconstruction.tiff"
  debug_dir:    "data/debug"

segmentation:
  method:            "threshold"   # "threshold" | "unet" (future)
  min_fragment_area: 2000          # px² — drops noise blobs
  contour_n_points:  512           # equidistant resampled contour length
  adaptive_block:    51            # adaptive threshold block size (odd)
  adaptive_c:        10            # adaptive threshold constant

features:
  device:        "cpu"             # "cuda" for gpu
  geo_dim:       64                # geometry branch output dim
  tex_dim:       128               # texture branch output dim
  embed_dim:     256               # fused eac-net output dim per contour pt
  strip_width:   16                # px wide texture strip around contour
  weights_path:  null              # null = random init; set after training

matching:
  index_type:    "flat"            # "flat" | "hnsw"
  top_k:         10                # candidate fragments per fragment
  hnsw_m:        32

registration:
  ransac_iters:      2000          # ransac iterations per candidate pair
  ransac_inlier_thr: 3.0           # px — inlier distance threshold
  min_inliers:       6             # reject pairs with fewer inliers
  min_score:         0.25          # minimum compatibility to keep an edge

solver:
  method:         "pgo"            # "pgo" (pose graph) | "greedy" (fast fallback)
  pgo_max_iter:   500
  pgo_tol:        1e-6

rendering:
  method:          "simple"        # "simple" | "poisson"
  canvas_padding:  60
  background_color: [255, 255, 255]

training:
  data_dir:      "data/training_docs"
  out_dir:       "data/training_fragments"
  fragments_per_doc: 6             # synthetic fragments to cut per document
  noise_std:     5.0               # px gaussian noise on cut path
  batch_size:    64
  lr:            1e-4
  epochs:        50
  temperature:   0.07              # infonce temperature τ
  checkpoint_dir: "checkpoints"